services:
  - type: web
    name: shl-recommender
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        value: AIzaSyB1uJXLP7nIcjSnW1QzdaIKUA53aFEoE5A    # Render deployment key
    healthCheckPath: /health
    autoDeploy: true
